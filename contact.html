<div class="contact-page">
  <h1>📬 聯絡我們</h1>
  
  <p class="contact-intro">
    有任何問題、建議，或想聊聊中藥方劑的故事？<br>
    歡迎留言，我會盡快回覆你！
  </p>

  <form 
    action="https://formspree.io/f/mzdrprpv" 
    method="POST"
    class="contact-form"
  >
    <div class="form-group">
      <label for="name">稱呼 *</label>
      <input type="text" id="name" name="name" required placeholder="你的名字或暱稱">
    </div>

    <div class="form-group">
      <label for="email">Email *</label>
      <input type="email" id="email" name="email" required placeholder="方便回覆你的信箱">
    </div>

    <div class="form-group">
      <label for="subject">主題</label>
      <select id="subject" name="subject">
        <option value="一般問題">一般問題</option>
        <option value="內容建議">內容建議（想看什麼方劑）</option>
        <option value="錯誤回報">錯誤回報</option>
        <option value="合作邀約">合作邀約</option>
        <option value="其他">其他</option>
      </select>
    </div>

    <div class="form-group">
      <label for="message">訊息內容 *</label>
      <textarea id="message" name="message" rows="6" required placeholder="想說什麼都可以..."></textarea>
    </div>

    <!-- Honeypot 防垃圾郵件 -->
    <input type="text" name="_gotcha" style="display:none">
    
    <!-- 成功後導向 -->
    <input type="hidden" name="_next" value="{{ site.url }}/contact-success/">
    
    <!-- 郵件主旨 -->
    <input type="hidden" name="_subject" value="草本故事館 - 新訊息">

    <button type="submit" class="submit-btn"><img src="{{ site.baseurl }}/assets/images/site-logo.png" alt="" style="width:1.2em;height:1.2em;border-radius:50%;vertical-align:-0.25em;margin-right:0.3em">送出訊息</button>
  </form>

  <div class="contact-alt">
    <p>或者透過其他方式聯繫：</p>
    <ul>
      <li>📧 Email：<a href="mailto:s881705@gmail.com">s881705@gmail.com</a></li>
      <li>📷 Instagram：<a href="https://instagram.com/meet.the.herbs" target="_blank">@meet.the.herbs</a></li>
    </ul>
  </div>
</div>
