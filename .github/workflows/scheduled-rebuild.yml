name: 每日定時重建（排程發布）

on:
  schedule:
    # 每天台灣時間早上 8:00 自動觸發（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 也可以手動觸發

jobs:
  trigger-vercel-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "✅ 已觸發 Vercel 重建"
