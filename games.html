<body>
<div id="root"></div>

{% comment %}
  =============================================
  從 site.stories 自動產生藥材與方劑資料
  =============================================
{% endcomment %}

<script id="auto-data" type="application/json">
{
  "formulas": [
    {% assign game_stories = site.stories | where_exp: "s", "s.date <= site.time" | where_exp: "s", "s.series != '炮製'" | where_exp: "s", "s.formula" | where_exp: "s", "s.ingredients" | sort: "date" %}
    {% for story in game_stories %}
    {
      "name": {{ story.formula | jsonify }},
      "link": "{{ story.url }}",
      "effects": {{ story.effects | default: "" | jsonify }},
      "tags": {{ story.tags | default: "" | jsonify }},
      "herbs": [
        {% for ing in story.ingredients %}
        {
          "name": {{ ing.name | jsonify }},
          "desc": {{ ing.description | default: "" | jsonify }},
          "image": {{ ing.image | default: "" | jsonify }}
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>

<script id="paozhi-data" type="application/json">
{
  "items": [
    {% assign pao_stories = site.stories | where_exp: "s", "s.date <= site.time" | where_exp: "s", "s.series == '炮製'" | where_exp: "s", "s.formula" | where_exp: "s", "s.effects" | sort: "date" %}
    {% for story in pao_stories %}
    {
      "name": {{ story.formula | jsonify }},
      "effects": {{ story.effects | jsonify }},
      "link": "{{ story.url }}"
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>

/* ═══════════ 從 Jekyll 自動產生的資料建構遊戲資料 ═══════════ */
const RAW = JSON.parse(document.getElementById('auto-data').textContent);

// 建立不重複的藥材清單
const herbMap = {};
RAW.formulas.forEach(function(f) {
  f.herbs.forEach(function(h) {
    var key = h.name;
    if (!herbMap[key]) {
      // 從 description 取角色名（格式："角色｜功效說明"）
      var parts = (h.desc || "").split("｜");
      herbMap[key] = {
        id: key,
        name: key,
        role: parts[0] || "",
        effect: parts[1] || parts[0] || "",
        image: h.image || ""
      };
    }
  });
});
const HERBS = Object.values(herbMap);

// 建立方劑清單
const FORMULAS = RAW.formulas.map(function(f) {
  return {
    name: f.name,
    link: f.link,
    effects: f.effects,
    herbNames: f.herbs.map(function(h) { return h.name; })
  };
});

/* 出題器：方劑 / 炮製 / 藥材找家 */
function buildFormulaQ(){
  return _shuffle(FORMULAS).slice(0,Math.min(8,FORMULAS.length)).map(function(f){
    var others=_shuffle(FORMULAS.filter(function(x){return x.name!==f.name;})).slice(0,3).map(function(x){return x.name;});
    var opts=_shuffle(others.concat([f.name]));
    return {clue:"📋 "+f.effects, q:"這是哪一帖方劑的功效？", options:opts, answer:opts.indexOf(f.name), link:f.link};
  });
}
function buildPaozhiQ(){
  return _shuffle(PAOZHI).slice(0,Math.min(8,PAOZHI.length)).map(function(p){
    var others=_shuffle(PAOZHI.filter(function(x){return x.name!==p.name;})).slice(0,3).map(function(x){return x.name;});
    var opts=_shuffle(others.concat([p.name]));
    return {clue:"🔥 "+p.effects, q:"這是哪一種炮製法？", options:opts, answer:opts.indexOf(p.name), link:p.link};
  });
}
function buildHerbQ(){
  var map={}; FORMULAS.forEach(function(f){ f.herbNames.forEach(function(n){ (map[n]=map[n]||[]).push(f); }); });
  var names=Object.keys(map);
  return _shuffle(names).slice(0,Math.min(8,names.length)).map(function(hn){
    var belongs=map[hn]; var cf=belongs[Math.floor(Math.random()*belongs.length)];
    var notC=_shuffle(FORMULAS.filter(function(f){return f.herbNames.indexOf(hn)===-1;})).slice(0,3).map(function(f){return f.name;});
    var opts=_shuffle(notC.concat([cf.name]));
    return {clue:"🌿 藥材：「"+hn+"」", q:"它是下列哪一帖方劑的成員？", options:opts, answer:opts.indexOf(cf.name), link:cf.link};
  });
}

/* 通用選擇題（看功效猜方劑 / 炮製變變變 / 藥材找家共用）*/
