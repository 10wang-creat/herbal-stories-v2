<body>
<div id="root"></div>

{% comment %}
  =============================================
  從 site.stories 自動產生藥材與方劑資料
  =============================================
{% endcomment %}

<script id="auto-data" type="application/json">
{
  "formulas": [
    {% assign sorted = site.stories | sort: "date" %}
    {% for story in sorted %}
    {% if story.formula and story.ingredients %}
    {
      "name": {{ story.formula | jsonify }},
      "link": "{{ story.url }}",
      "effects": {{ story.effects | default: "" | jsonify }},
      "tags": {{ story.tags | default: "" | jsonify }},
      "herbs": [
        {% for ing in story.ingredients %}
        {
          "name": {{ ing.name | jsonify }},
          "desc": {{ ing.description | default: "" | jsonify }},
          "image": {{ ing.image | default: "" | jsonify }}
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    }{% unless forloop.last %},{% endunless %}
    {% endif %}
    {% endfor %}
  ]
}
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ═══════════ 從 Jekyll 自動產生的資料建構遊戲資料 ═══════════ */
const RAW = JSON.parse(document.getElementById('auto-data').textContent);

// 建立不重複的藥材清單
const herbMap = {};
RAW.formulas.forEach(function(f) {
  f.herbs.forEach(function(h) {
    var key = h.name;
    if (!herbMap[key]) {
      // 從 description 取角色名（格式："角色｜功效說明"）
      var parts = (h.desc || "").split("｜");
      herbMap[key] = {
        id: key,
        name: key,
        role: parts[0] || "",
        effect: parts[1] || parts[0] || "",
        image: h.image || ""
      };
    }
  });
});
const HERBS = Object.values(herbMap);

// 建立方劑清單
const FORMULAS = RAW.formulas.map(function(f) {
  return {
    name: f.name,
    link: f.link,
    effects: f.effects,
    herbNames: f.herbs.map(function(h) { return h.name; })
  };
});

/* ═══════════ 問答題（需手動維護，情境無法自動產生）═══════════ */
const SYMPTOMS_QUIZ = [
  { scenario:"小美最近加班頻繁，總覺得四肢無力、食慾不振、說話有氣無力，臉色蠟黃。", question:"小美最可能需要哪個方劑？", options:["四君子湯","四物湯","逍遙散","生化湯"], answer:0, explanation:"四肢無力、食慾不振、氣短懶言、面色萎黃都是脾氣虛的典型表現，四君子湯是補氣健脾的基礎方。" },
  { scenario:"阿華面色蒼白、頭暈眼花，每次月經量少色淡，還常覺得手腳冰冷、指甲色淡。", question:"阿華的狀況適合哪個方劑？", options:["逍遙散","四君子湯","四物湯","生化湯"], answer:2, explanation:"面色蒼白、頭暈、月經量少色淡、爪甲色淡是血虛的表現，四物湯是補血調經的基礎方。" },
  { scenario:"老張工作壓力大，常常嘆氣、胸悶、脾氣暴躁，還經常脅肋脹痛，月經也不規律。", question:"老張需要的方劑是？", options:["四物湯","生化湯","四君子湯","逍遙散"], answer:3, explanation:"嘆氣、胸悶、脾氣暴躁、脅肋脹痛都是肝氣鬱結的表現，逍遙散能疏肝解鬱、養血健脾。" },
  { scenario:"小琳剛自然產完一週，惡露排出不順暢，顏色暗紅帶有血塊，小腹隱隱冷痛。", question:"小琳適合用哪個方劑？", options:["四君子湯","逍遙散","四物湯","生化湯"], answer:3, explanation:"產後惡露不行、小腹冷痛，生化湯能活血化瘀、溫經止痛，幫助產後恢復。" },
  { scenario:"阿婆最近覺得頭暈目眩、疲倦乏力，臉色發黃，蹲下站起來會眼前發黑。", question:"阿婆可能需要哪個方劑？", options:["當歸補血湯","逍遙散","生化湯","四君子湯"], answer:0, explanation:"頭暈、疲倦、面色萎黃是氣血兩虛的表現，當歸補血湯以補氣生血為主，適合氣血不足。" },
  { scenario:"大雄長期熬夜打電動，最近腰痠背痛、掉頭髮、耳鳴、手心腳心發熱，晚上盜汗。", question:"大雄最適合哪個方劑？", options:["四君子湯","金匱腎氣丸","逍遙散","六味地黃丸"], answer:3, explanation:"腰痠、掉髮、耳鳴、手足心熱、盜汗都是腎陰虛的表現，六味地黃丸滋陰補腎。" },
  { scenario:"王伯伯入冬後特別怕冷、腰像被冰敷著、夜尿頻繁一晚三四次、下肢水腫。", question:"王伯伯的狀況適合哪個方劑？", options:["六味地黃丸","逍遙散","金匱腎氣丸","四物湯"], answer:2, explanation:"極度怕冷、腰冷痛、夜尿頻繁、下肢水腫都是腎陽虛的表現，金匱腎氣丸溫補腎陽。" },
  { scenario:"小莉是百貨專櫃小姐，久站後覺得身體往下墜、說話越來越沒力、反覆感冒。", question:"小莉需要哪個方劑來調理？", options:["逍遙散","補中益氣湯","四物湯","六味地黃丸"], answer:1, explanation:"久站乏力、身體下墜感、反覆感冒是中氣下陷的表現，補中益氣湯能補氣升陽。" },
  { scenario:"換季時小花又開始打噴嚏、流鼻水，動不動就被同事傳染感冒，容易出汗怕風。", question:"小花適合用什麼方劑預防？", options:["四物湯","逍遙散","玉屏風散","生化湯"], answer:2, explanation:"反覆感冒、容易出汗、畏風怕冷是表虛衛氣不固的表現，玉屏風散能益氣固表。" },
  { scenario:"雅琪長期照顧中風的媽媽，最近失眠淺眠、健忘心悸、食慾差、面色萎黃、多夢。", question:"雅琪最需要哪個方劑？", options:["逍遙散","六味地黃丸","歸脾湯","四物湯"], answer:2, explanation:"失眠健忘、心悸、食慾差、面色萎黃是心脾兩虛的表現，歸脾湯能養心脾、補氣血。" },
  { scenario:"阿偉氣血都虛，不但臉色蒼白、容易累、食慾差（氣虛），還頭暈、心悸、經期量少（血虛）。", question:"阿偉需要哪個方劑？", options:["四君子湯","四物湯","逍遙散","八珍湯"], answer:3, explanation:"同時出現氣虛和血虛症狀，八珍湯是四君子湯＋四物湯的合方，能氣血雙補。" },
  { scenario:"小胖脾胃虛弱，常常拉肚子、吃什麼都不太吸收，體內濕氣重、舌苔白膩。", question:"小胖適合用什麼調理？", options:["四物湯","六味地黃丸","四神湯","逍遙散"], answer:2, explanation:"脾虛泄瀉、濕氣重、消化不良，四神湯能平補脾胃、健脾祛濕，而且性質平和適合長期食療。" },
  { scenario:"小安最近越累越睡不著，躺在床上腦子轉不停，好不容易睡著又多夢易驚醒，還會盜汗。", question:"小安最適合哪個方劑？", options:["歸脾湯","逍遙散","酸棗仁湯","六味地黃丸"], answer:2, explanation:"越累越睡不著、虛煩多夢、盜汗是肝血不足導致的虛煩不眠，酸棗仁湯能養血安神、清熱除煩。" },
];
