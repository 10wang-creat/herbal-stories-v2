<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 基本 SEO -->
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title | default: "草本故事館" }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="keywords" content="中醫, 中藥, 方劑, 炮製, {% if page.tags %}{{ page.tags | join: ', ' }}, {% endif %}傳統醫學, 草本故事">
  <meta name="author" content="{{ site.title }}">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{% if page.layout == 'story' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/{{ page.og_image | default: 'og-image.png' }}">
  <meta property="og:image:secure_url" content="{{ site.url }}{{ site.baseurl }}/assets/images/{{ page.og_image | default: 'og-image.png' }}">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="2400">
  <meta property="og:image:height" content="1260">
  <meta property="og:image:alt" content="{{ site.title }}｜{{ site.description }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="zh_TW">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta name="twitter:image" content="{{ site.url }}{{ site.baseurl }}/assets/images/{{ page.og_image | default: 'og-image.png' }}">
  <meta name="twitter:image:alt" content="{{ site.title }}">

  <!-- 給 Google／舊版爬蟲的縮圖提示（優先用品牌分享圖）-->
  <link rel="image_src" href="{{ site.url }}{{ site.baseurl }}/assets/images/{{ page.og_image | default: 'og-image.png' }}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/images/favicon.png">
  <link rel="shortcut icon" type="image/png" href="{{ site.baseurl }}/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/assets/images/favicon.png">

  <!-- 字體：優雅襯線標題 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">

  <!-- 共用樣式 -->
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">

  <!-- Feed -->
  {% feed_meta %}

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>

<body class="{{ page.body_class }}{% if page.layout == 'story' and page.series %} theme-paozhi{% endif %}">
  <!-- 網站 Header -->
  <header class="site-header">
    <div class="wrapper">
      <a href="{{ site.baseurl }}/" class="site-title">🌿 草本故事館</a>

      <button class="nav-toggle" aria-label="開啟選單" aria-expanded="false" onclick="var n=document.getElementById('siteNav');var o=n.classList.toggle('open');this.setAttribute('aria-expanded',o);">
        <span></span><span></span><span></span>
      </button>

      <nav class="site-nav" id="siteNav">
        <a href="{{ site.baseurl }}/">首頁</a>
        <a href="{{ site.baseurl }}/formulas/"><span class="nav-dot formula"></span>方劑系列</a>
        <a href="{{ site.baseurl }}/paozhi/"><span class="nav-dot paozhi"></span>炮製系列</a>
        <a href="{{ site.baseurl }}/characters/">圖鑑</a>
        <a href="{{ site.baseurl }}/games/">遊樂園</a>
        <a href="{{ site.baseurl }}/about/">關於</a>
      </nav>
    </div>
  </header>

  <!-- 主要內容 -->
  <main class="page-content">
    {{ content }}
  </main>

  <!-- 頁尾 -->
  {% include footer.html %}
</body>
</html>
