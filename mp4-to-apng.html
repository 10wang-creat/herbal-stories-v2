<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP4 轉 APNG｜LINE 動態貼圖工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: #fdf8f0;
      color: #3d2b1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.8rem;
      color: #7b4f2e;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.95rem;
      color: #9e7a5a;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2.5px dashed #c8a882;
      border-radius: 12px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 24px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      background: #fff8f0;
      border-color: #a0682a;
    }

    .drop-zone .icon { font-size: 2.4rem; margin-bottom: 10px; }

    .drop-zone p {
      font-size: 0.95rem;
      color: #9e7a5a;
      line-height: 1.6;
    }

    .drop-zone strong { color: #7b4f2e; }

    #fileInput { display: none; }

    /* Settings */
    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .setting-group label {
      display: block;
      font-size: 0.82rem;
      color: #9e7a5a;
      margin-bottom: 6px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .setting-group select,
    .setting-group input[type="number"] {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #e0c9b0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fdf8f0;
      color: #3d2b1f;
      outline: none;
      transition: border-color 0.2s;
    }

    .setting-group select:focus,
    .setting-group input:focus {
      border-color: #a0682a;
    }

    /* Preset buttons */
    .presets {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #c8a882;
      background: #fff;
      color: #7b4f2e;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover, .preset-btn.active {
      background: #7b4f2e;
      color: #fff;
      border-color: #7b4f2e;
    }

    /* Convert button */
    #convertBtn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a0682a, #7b4f2e);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #convertBtn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    #convertBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Progress */
    #progressArea {
      margin-top: 20px;
      display: none;
    }

    .progress-bar-wrap {
      background: #f0e4d4;
      border-radius: 8px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c8a882, #a0682a);
      border-radius: 8px;
      transition: width 0.3s;
    }

    #statusText {
      font-size: 0.88rem;
      color: #9e7a5a;
      text-align: center;
    }

    /* Preview */
    #previewArea {
      margin-top: 24px;
      display: none;
      text-align: center;
    }

    #previewArea h3 {
      font-size: 1rem;
      color: #7b4f2e;
      margin-bottom: 12px;
    }

    #previewImg {
      max-width: 100%;
      border-radius: 10px;
      border: 2px solid #e0c9b0;
      background: repeating-conic-gradient(#ddd 0% 25%, #fff 0% 50%) 0 0 / 16px 16px;
    }

    .file-info {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #9e7a5a;
    }

    .warning { color: #c0392b; font-weight: 600; }
    .ok { color: #27ae60; font-weight: 600; }

    #downloadBtn {
      margin-top: 16px;
      padding: 12px 28px;
      background: #27ae60;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #downloadBtn:hover { opacity: 0.88; }

    /* Spec table */
    .spec-table {
      margin-top: 28px;
      border-top: 1.5px solid #e0c9b0;
      padding-top: 20px;
    }

    .spec-table h3 {
      font-size: 0.88rem;
      color: #9e7a5a;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .spec-table table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .spec-table td {
      padding: 6px 8px;
      border-bottom: 1px solid #f0e4d4;
    }

    .spec-table td:first-child { color: #9e7a5a; width: 50%; }
    .spec-table td:last-child { color: #3d2b1f; font-weight: 600; }

    /* Loading overlay for FFmpeg */
    #ffmpegLoading {
      position: fixed;
      inset: 0;
      background: rgba(253, 248, 240, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0c9b0;
      border-top-color: #a0682a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #ffmpegLoading p { color: #7b4f2e; font-size: 0.95rem; }

    footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #c8a882;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- FFmpeg loading overlay -->
<div id="ffmpegLoading">
  <div class="spinner"></div>
  <p>載入 FFmpeg 引擎中，請稍候...</p>
</div>

<header>
  <h1>🎴 MP4 → APNG 轉換器</h1>
  <p>LINE 動態貼圖格式轉換工具｜Studio 10</p>
</header>

<div class="card">

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <div class="icon">🎬</div>
    <p><strong>拖放 MP4 檔案到這裡</strong><br>或點擊選擇檔案</p>
    <input type="file" id="fileInput" accept="video/mp4,.mp4" />
  </div>

  <!-- Presets -->
  <div class="presets">
    <span style="font-size:0.82rem;color:#9e7a5a;align-self:center;">快速設定：</span>
    <button class="preset-btn active" data-w="320" data-h="270" data-fps="12" data-loop="0">LINE 動態貼圖</button>
    <button class="preset-btn" data-w="240" data-h="240" data-fps="10" data-loop="0">LINE 主圖示</button>
    <button class="preset-btn" data-w="640" data-h="640" data-fps="15" data-loop="0">自訂大尺寸</button>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="setting-group">
      <label>寬度 (px)</label>
      <input type="number" id="width" value="320" min="1" max="1000" />
    </div>
    <div class="setting-group">
      <label>高度 (px)</label>
      <input type="number" id="height" value="270" min="1" max="1000" />
    </div>
    <div class="setting-group">
      <label>幀率 (FPS)</label>
      <input type="number" id="fps" value="12" min="1" max="30" />
    </div>
    <div class="setting-group">
      <label>循環次數</label>
      <select id="loop">
        <option value="0">無限循環</option>
        <option value="1">播放 1 次</option>
        <option value="2">播放 2 次</option>
        <option value="3">播放 3 次</option>
      </select>
    </div>
  </div>

  <!-- Convert Button -->
  <button id="convertBtn" disabled>選擇 MP4 檔案後開始轉換</button>

  <!-- Progress -->
  <div id="progressArea">
    <div class="progress-bar-wrap">
      <div id="progressBar"></div>
    </div>
    <div id="statusText">準備中...</div>
  </div>

  <!-- Preview & Download -->
  <div id="previewArea">
    <h3>✅ 轉換完成</h3>
    <img id="previewImg" src="" alt="APNG 預覽" />
    <div class="file-info" id="fileInfo"></div>
    <br />
    <button id="downloadBtn">⬇️ 下載 APNG</button>
  </div>

  <!-- Spec Reference -->
  <div class="spec-table">
    <h3>📋 LINE 動態貼圖規格</h3>
    <table>
      <tr><td>格式</td><td>APNG</td></tr>
      <tr><td>尺寸</td><td>320 × 270 px</td></tr>
      <tr><td>每檔上限</td><td>300 KB</td></tr>
      <tr><td>主圖示</td><td>240 × 240 px</td></tr>
      <tr><td>Tab 圖示</td><td>96 × 74 px</td></tr>
      <tr><td>動畫時長</td><td>建議 1–4 秒</td></tr>
    </table>
  </div>

</div>

<footer>Studio 10 工具箱 · 本工具在瀏覽器本地執行，檔案不會上傳至任何伺服器</footer>

<!-- FFmpeg.wasm -->
<script type="module">
  import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
  import { fetchFile, toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';

  const ffmpeg = new FFmpeg();
  let inputFile = null;
  let apngBlob = null;

  // Load FFmpeg
  async function loadFFmpeg() {
    const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';
    await ffmpeg.load({
      coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
    });
    document.getElementById('ffmpegLoading').style.display = 'none';
  }

  loadFFmpeg().catch(err => {
    document.getElementById('ffmpegLoading').innerHTML = `<p style="color:#c0392b">FFmpeg 載入失敗，請重新整理頁面<br><small>${err.message}</small></p>`;
  });

  // Log progress
  ffmpeg.on('log', ({ message }) => {
    const statusText = document.getElementById('statusText');
    if (message.includes('frame=')) {
      statusText.textContent = '轉換中：' + message.substring(0, 60);
    }
  });

  ffmpeg.on('progress', ({ progress }) => {
    const pct = Math.round(progress * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    if (pct >= 100) document.getElementById('statusText').textContent = '完成！正在準備檔案...';
  });

  // Drop zone
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'video/mp4') setFile(file);
  });

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) setFile(e.target.files[0]);
  });

  function setFile(file) {
    inputFile = file;
    dropZone.querySelector('p').innerHTML = `<strong>${file.name}</strong><br>${(file.size / 1024 / 1024).toFixed(2)} MB`;
    dropZone.querySelector('.icon').textContent = '✅';
    document.getElementById('convertBtn').disabled = false;
    document.getElementById('convertBtn').textContent = '開始轉換 → APNG';
    document.getElementById('previewArea').style.display = 'none';
    apngBlob = null;
  }

  // Preset buttons
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('width').value = btn.dataset.w;
      document.getElementById('height').value = btn.dataset.h;
      document.getElementById('fps').value = btn.dataset.fps;
      document.getElementById('loop').value = btn.dataset.loop;
    });
  });

  // Convert
  document.getElementById('convertBtn').addEventListener('click', async () => {
    if (!inputFile) return;

    const w = document.getElementById('width').value;
    const h = document.getElementById('height').value;
    const fps = document.getElementById('fps').value;
    const loop = document.getElementById('loop').value;

    const progressArea = document.getElementById('progressArea');
    const convertBtn = document.getElementById('convertBtn');
    const previewArea = document.getElementById('previewArea');

    progressArea.style.display = 'block';
    previewArea.style.display = 'none';
    convertBtn.disabled = true;
    convertBtn.textContent = '轉換中...';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('statusText').textContent = '讀取檔案中...';

    try {
      await ffmpeg.writeFile('input.mp4', await fetchFile(inputFile));

      document.getElementById('statusText').textContent = '轉換中，請稍候...';

      await ffmpeg.exec([
        '-i', 'input.mp4',
        '-vf', `fps=${fps},scale=${w}:${h}:flags=lanczos`,
        '-f', 'apng',
        '-plays', loop,
        '-compression_level', '6',
        'output.apng'
      ]);

      const data = await ffmpeg.readFile('output.apng');
      apngBlob = new Blob([data.buffer], { type: 'image/png' });
      const url = URL.createObjectURL(apngBlob);

      const img = document.getElementById('previewImg');
      img.src = url;
      previewArea.style.display = 'block';

      const sizeKB = (apngBlob.size / 1024).toFixed(1);
      const sizeClass = apngBlob.size > 300 * 1024 ? 'warning' : 'ok';
      const sizeMsg = apngBlob.size > 300 * 1024 ? '⚠️ 超過 300KB 限制，請降低 FPS 或縮短影片' : '✅ 符合 LINE 規格';
      document.getElementById('fileInfo').innerHTML =
        `${w}×${h}px｜${fps}fps｜<span class="${sizeClass}">${sizeKB} KB　${sizeMsg}</span>`;

      document.getElementById('statusText').textContent = '轉換成功！';
      document.getElementById('progressBar').style.width = '100%';

      await ffmpeg.deleteFile('input.mp4');
      await ffmpeg.deleteFile('output.apng');

    } catch (err) {
      document.getElementById('statusText').textContent = '❌ 轉換失敗：' + err.message;
      console.error(err);
    }

    convertBtn.disabled = false;
    convertBtn.textContent = '重新轉換';
  });

  // Download
  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (!apngBlob) return;
    const a = document.createElement('a');
    const baseName = inputFile ? inputFile.name.replace(/\.mp4$/i, '') : 'sticker';
    a.href = URL.createObjectURL(apngBlob);
    a.download = `${baseName}.apng`;
    a.click();
  });
</script>

</body>
</html>
